<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22222f;
  --border: #2e2e3f;
  --accent: #7c6af7;
  --accent2: #f7a26a;
  --text: #e8e8f0;
  --text2: #8888aa;
  --text3: #555570;
  --success: #5dd88a;
  --danger: #f76a6a;
  --user-bubble: #2a2640;
  --ai-bubble: #1e1e2a;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.app-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}

.new-project-btn {
  width: 100%;
  padding: 8px 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}

.new-project-btn:hover { opacity: 0.85; }

.projects-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.projects-list::-webkit-scrollbar { width: 4px; }
.projects-list::-webkit-scrollbar-track { background: transparent; }
.projects-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.project-item {
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.project-item:hover { background: var(--surface2); }
.project-item.active { background: var(--user-bubble); border-left: 3px solid var(--accent); }

.project-info { flex: 1; min-width: 0; }

.project-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-desc {
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.project-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}

.project-item:hover .project-actions { opacity: 1; }

.icon-btn {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  padding: 3px;
  border-radius: 3px;
  font-size: 12px;
  transition: all 0.15s;
  line-height: 1;
}

.icon-btn:hover { background: var(--border); color: var(--text); }
.icon-btn.danger:hover { color: var(--danger); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
}

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── TOP BAR ── */
.topbar {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  flex-shrink: 0;
}

.current-project {
  display: flex;
  align-items: center;
  gap: 10px;
}

.current-project-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  font-weight: 600;
}

.project-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(124,106,247,0.15);
  color: var(--accent);
  letter-spacing: 0.05em;
}

.topbar-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.clear-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s;
}

.clear-btn:hover { border-color: var(--danger); color: var(--danger); }

.edit-prompt-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s;
}

.edit-prompt-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── CHAT ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text3);
  text-align: center;
}

.empty-icon { font-size: 48px; opacity: 0.4; }
.empty-title { font-family: 'Shippori Mincho', serif; font-size: 18px; color: var(--text2); }
.empty-desc { font-size: 13px; line-height: 1.6; max-width: 300px; }

.message {
  display: flex;
  gap: 12px;
  animation: msgIn 0.25s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { flex-direction: row-reverse; }

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  font-weight: 600;
}

.message.user .avatar { background: var(--accent); color: white; }
.message.ai .avatar { background: var(--surface2); color: var(--accent2); border: 1px solid var(--border); }

.bubble {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

.message.user .bubble {
  background: var(--user-bubble);
  border: 1px solid rgba(124,106,247,0.2);
  border-radius: 12px 4px 12px 12px;
}

.message.ai .bubble {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  border-radius: 4px 12px 12px 12px;
}

.bubble-actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.15s;
}

.message:hover .bubble-actions { opacity: 1; }

.bubble-action-btn {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 11px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
  transition: all 0.15s;
  font-family: 'DM Mono', monospace;
}

.bubble-action-btn:hover { background: var(--border); color: var(--text2); }

.thinking {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}

.thinking span {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
  opacity: 0.6;
}

.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-6px); }
}

/* ── INPUT ── */
.input-area {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.input-wrap {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  transition: border-color 0.2s;
}

.input-wrap:focus-within { border-color: var(--accent); }

.chat-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
  outline: none;
  max-height: 160px;
  min-height: 24px;
}

.chat-input::placeholder { color: var(--text3); }

.send-btn {
  background: var(--accent);
  border: none;
  color: white;
  width: 34px;
  height: 34px;
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.2s;
  flex-shrink: 0;
  font-size: 15px;
}

.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.input-hint {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  margin-top: 8px;
}

/* ── NO PROJECT ── */
.no-project {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text2);
  text-align: center;
  padding: 40px;
}

.no-project-icon { font-size: 60px; opacity: 0.3; }
.no-project h2 { font-family: 'Shippori Mincho', serif; font-size: 20px; color: var(--text); }
.no-project p { font-size: 13px; line-height: 1.7; color: var(--text2); max-width: 320px; }

.start-btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-top: 8px;
}

.start-btn:hover { opacity: 0.85; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  width: 500px;
  max-width: 90vw;
  box-shadow: var(--shadow);
  animation: slideUp 0.2s ease;
}

@keyframes slideUp {
  from { transform: translateY(16px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--text);
}

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

.form-input, .form-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 10px 12px;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }

.form-hint {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  line-height: 1.4;
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}

.btn {
  padding: 8px 18px;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { opacity: 0.85; }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }

/* ── EMOJI PICKER ── */
.emoji-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.emoji-opt {
  width: 34px;
  height: 34px;
  border-radius: 6px;
  border: 2px solid transparent;
  background: var(--surface2);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.emoji-opt:hover { border-color: var(--accent); }
.emoji-opt.selected { border-color: var(--accent); background: rgba(124,106,247,0.15); }

@media (max-width: 640px) {
  .sidebar { width: 200px; min-width: 200px; }
  .bubble { max-width: 85%; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="app-title">✦ My AI Assistant</div>
    <button class="new-project-btn" onclick="openNewProjectModal()">
      ＋ 新しいプロジェクト
    </button>
  </div>
  <div class="projects-list" id="projectsList"></div>
  <div class="sidebar-footer" id="sidebarFooter">Claude Sonnet 4.6</div>
</div>

<!-- MAIN -->
<div class="main" id="mainArea">
  <div class="no-project" id="noProject">
    <div class="no-project-icon">✦</div>
    <h2>プロジェクトを作成してください</h2>
    <p>左の「新しいプロジェクト」からプロジェクトを作成して、AIとのチャットを始めましょう。</p>
    <button class="start-btn" onclick="openNewProjectModal()">最初のプロジェクトを作る</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">新しいプロジェクト</div>

    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div class="emoji-row" id="emojiPicker">
        <!-- filled by JS -->
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">プロジェクト名 *</label>
      <input type="text" class="form-input" id="projectName" placeholder="例：メール作成、履歴書改善、求人票分析..." maxlength="30">
    </div>

    <div class="form-group">
      <label class="form-label">説明（任意）</label>
      <input type="text" class="form-input" id="projectDesc" placeholder="例：候補者・企業へのメール作成" maxlength="50">
    </div>

    <div class="form-group">
      <label class="form-label">システムPrompt *</label>
      <textarea class="form-textarea" id="projectPrompt" placeholder="AIへの指示を書いてください。

例：あなたは日本の人材紹介会社の採用コンサルタントです。候補者と企業へのメールを丁寧かつ自然なビジネス日本語で作成してください。メールは簡潔に、件名から始めてください。"></textarea>
      <div class="form-hint">AIがどのように振る舞うかを指定します。具体的に書くほど精度が上がります。</div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideModal()">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveProject()">作成</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let projects = JSON.parse(localStorage.getItem('aiProjects') || '[]');
let currentProjectId = null;
let editingProjectId = null;
let selectedEmoji = '💬';
let isLoading = false;

const EMOJIS = ['💬','📧','📄','📋','🔍','✍️','📊','🤝','💼','🎯','⚡','🌐','📝','🗂️','💡'];

// ── Init ───────────────────────────────────────────────────────────────────
renderProjects();
initEmojiPicker();

function initEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`
  ).join('');
}

function selectEmoji(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => {
    el.classList.toggle('selected', el.textContent === e);
  });
}

// ── Projects ───────────────────────────────────────────────────────────────
function saveProjects() {
  localStorage.setItem('aiProjects', JSON.stringify(projects));
}

function renderProjects() {
  const list = document.getElementById('projectsList');
  if (!projects.length) {
    list.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text3)">プロジェクトがまだありません</div>';
    return;
  }
  list.innerHTML = projects.map(p => `
    <div class="project-item ${p.id === currentProjectId ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <div class="project-info">
        <div class="project-name">${p.emoji} ${p.name}</div>
        ${p.desc ? `<div class="project-desc">${p.desc}</div>` : ''}
      </div>
      <div class="project-actions">
        <button class="icon-btn" onclick="event.stopPropagation();openEditModal('${p.id}')" title="編集">✏️</button>
        <button class="icon-btn danger" onclick="event.stopPropagation();deleteProject('${p.id}')" title="削除">🗑</button>
      </div>
    </div>
  `).join('');
}

function selectProject(id) {
  currentProjectId = id;
  renderProjects();
  renderChatArea();
}

function deleteProject(id) {
  if (!confirm('このプロジェクトを削除しますか？')) return;
  projects = projects.filter(p => p.id !== id);
  localStorage.removeItem(`chat_${id}`);
  if (currentProjectId === id) {
    currentProjectId = null;
    renderChatArea();
  }
  saveProjects();
  renderProjects();
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openNewProjectModal() {
  editingProjectId = null;
  selectedEmoji = '💬';
  document.getElementById('modalTitle').textContent = '新しいプロジェクト';
  document.getElementById('modalSaveBtn').textContent = '作成';
  document.getElementById('projectName').value = '';
  document.getElementById('projectDesc').value = '';
  document.getElementById('projectPrompt').value = '';
  initEmojiPicker();
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('projectName').focus(), 100);
}

function openEditModal(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  editingProjectId = id;
  selectedEmoji = p.emoji;
  document.getElementById('modalTitle').textContent = 'プロジェクトを編集';
  document.getElementById('modalSaveBtn').textContent = '保存';
  document.getElementById('projectName').value = p.name;
  document.getElementById('projectDesc').value = p.desc || '';
  document.getElementById('projectPrompt').value = p.prompt;
  initEmojiPicker();
  document.getElementById('modalOverlay').style.display = 'flex';
}

function hideModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) hideModal();
}

function saveProject() {
  const name = document.getElementById('projectName').value.trim();
  const desc = document.getElementById('projectDesc').value.trim();
  const prompt = document.getElementById('projectPrompt').value.trim();

  if (!name) { alert('プロジェクト名を入力してください'); return; }
  if (!prompt) { alert('システムPromptを入力してください'); return; }

  if (editingProjectId) {
    const idx = projects.findIndex(p => p.id === editingProjectId);
    if (idx !== -1) {
      projects[idx] = { ...projects[idx], name, desc, prompt, emoji: selectedEmoji };
    }
  } else {
    const newP = { id: Date.now().toString(), name, desc, prompt, emoji: selectedEmoji };
    projects.push(newP);
    currentProjectId = newP.id;
  }

  saveProjects();
  renderProjects();
  renderChatArea();
  hideModal();
}

// ── Chat Area ──────────────────────────────────────────────────────────────
function renderChatArea() {
  const main = document.getElementById('mainArea');
  const noProject = document.getElementById('noProject');

  if (!currentProjectId) {
    main.innerHTML = `
      <div class="no-project" id="noProject">
        <div class="no-project-icon">✦</div>
        <h2>プロジェクトを選択してください</h2>
        <p>左のリストからプロジェクトを選ぶか、新しいプロジェクトを作成してください。</p>
        <button class="start-btn" onclick="openNewProjectModal()">新しいプロジェクトを作る</button>
      </div>`;
    return;
  }

  const p = projects.find(x => x.id === currentProjectId);
  if (!p) return;

  main.innerHTML = `
    <div class="topbar">
      <div class="current-project">
        <span style="font-size:20px">${p.emoji}</span>
        <span class="current-project-name">${p.name}</span>
        <span class="project-badge">AI</span>
      </div>
      <div class="topbar-actions">
        <button class="edit-prompt-btn" onclick="openEditModal('${p.id}')">⚙ Prompt編集</button>
        <button class="clear-btn" onclick="clearChat('${p.id}')">🗑 履歴クリア</button>
      </div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="メッセージを入力... (Shift+Enter で送信)" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">Shift+Enter で送信 · Enter で改行</div>
    </div>`;

  renderMessages();
  scrollToBottom();
}

function getMessages() {
  return JSON.parse(localStorage.getItem(`chat_${currentProjectId}`) || '[]');
}

function saveMessages(msgs) {
  localStorage.setItem(`chat_${currentProjectId}`, JSON.stringify(msgs));
}

function renderMessages() {
  const chatArea = document.getElementById('chatArea');
  if (!chatArea) return;
  const msgs = getMessages();

  if (!msgs.length) {
    const p = projects.find(x => x.id === currentProjectId);
    chatArea.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${p?.emoji || '💬'}</div>
        <div class="empty-title">${p?.name}</div>
        <div class="empty-desc">${p?.desc || 'メッセージを入力して会話を始めましょう'}</div>
      </div>`;
    return;
  }

  chatArea.innerHTML = msgs.map((m, i) => `
    <div class="message ${m.role}">
      <div class="avatar">${m.role === 'user' ? 'Z' : '✦'}</div>
      <div>
        <div class="bubble">${escapeHtml(m.content)}</div>
        <div class="bubble-actions">
          <button class="bubble-action-btn" onclick="copyMsg(${i})">コピー</button>
          ${m.role === 'ai' ? `<button class="bubble-action-btn" onclick="regenMsg(${i})">再生成</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  scrollToBottom();
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToBottom() {
  const chatArea = document.getElementById('chatArea');
  if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;
}

function clearChat(id) {
  if (!confirm('会話履歴をクリアしますか？')) return;
  localStorage.removeItem(`chat_${id}`);
  renderMessages();
}

function copyMsg(idx) {
  const msgs = getMessages();
  navigator.clipboard.writeText(msgs[idx]?.content || '');
}

async function regenMsg(idx) {
  const msgs = getMessages();
  const truncated = msgs.slice(0, idx);
  saveMessages(truncated);
  renderMessages();
  await callAPI(truncated);
}

// ── Send ───────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text || isLoading) return;

  const msgs = getMessages();
  msgs.push({ role: 'user', content: text });
  saveMessages(msgs);
  input.value = '';
  input.style.height = 'auto';
  renderMessages();

  await callAPI(msgs);
}

async function callAPI(msgs) {
  isLoading = true;
  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) sendBtn.disabled = true;

  // Add thinking indicator
  const chatArea = document.getElementById('chatArea');
  if (chatArea) {
    const thinking = document.createElement('div');
    thinking.className = 'message ai';
    thinking.id = 'thinkingMsg';
    thinking.innerHTML = `
      <div class="avatar">✦</div>
      <div class="bubble">
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>`;
    chatArea.appendChild(thinking);
    scrollToBottom();
  }

  try {
    const p = projects.find(x => x.id === currentProjectId);
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt: p?.prompt || '',
        messages: msgs.map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }))
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'エラーが発生しました');

    const allMsgs = getMessages();
    allMsgs.push({ role: 'ai', content: data.content });
    saveMessages(allMsgs);

  } catch(e) {
    const allMsgs = getMessages();
    allMsgs.push({ role: 'ai', content: '⚠ エラー: ' + e.message });
    saveMessages(allMsgs);
  } finally {
    const t = document.getElementById('thinkingMsg');
    if (t) t.remove();
    isLoading = false;
    if (sendBtn) sendBtn.disabled = false;
    renderMessages();
    const input = document.getElementById('chatInput');
    if (input) input.focus();
  }
}

// ── Initial render ─────────────────────────────────────────────────────────
if (projects.length === 0) {
  document.getElementById('mainArea').innerHTML = `
    <div class="no-project" id="noProject">
      <div class="no-project-icon">✦</div>
      <h2>プロジェクトを作成してください</h2>
      <p>左の「新しいプロジェクト」からプロジェクトを作成して、AIとのチャットを始めましょう。</p>
      <button class="start-btn" onclick="openNewProjectModal()">最初のプロジェクトを作る</button>
    </div>`;
}
</script>
</body>
</html>
